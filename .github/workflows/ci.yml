name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
      - run: python -m pip install --requirement requirements.txt
      - run: python -m compileall -q .
      - run: python -m pytest -q
      - run: scripts/verify_repository_hygiene.sh
      - run: git diff --check
      - name: Verify research strategies are not production-registered
        run: |
          if git grep -n 'failed_range_escape_reversal_v1' -- strategies app execution; then
            echo 'research-only strategy is production-registered' >&2
            exit 1
          fi
